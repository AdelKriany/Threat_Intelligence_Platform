services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threatlens-api
    command: uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --factory
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me-in-production
      DATABASE_URL: postgresql+psycopg://threatlens:threatlens@db:5432/threatlens
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threatlens-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me-in-production
      DATABASE_URL: postgresql+psycopg://threatlens:threatlens@db:5432/threatlens
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threatlens-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me-in-production
      DATABASE_URL: postgresql+psycopg://threatlens:threatlens@db:5432/threatlens
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    container_name: threatlens-db
    environment:
      POSTGRES_DB: threatlens
      POSTGRES_USER: threatlens
      POSTGRES_PASSWORD: threatlens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: threatlens-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
